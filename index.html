<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Markets">
<meta name="theme-color" content="#0a0e17">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Market Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e17;
    color: #d1d4dc;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-overflow-scrolling: touch;
  }

  header {
    background: #131722;
    border-bottom: 1px solid #1e222d;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    padding-top: max(12px, env(safe-area-inset-top));
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
  }

  #clock {
    font-size: 12px;
    color: #787b86;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }

  .dashboard {
    padding: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 1600px;
    margin: 0 auto;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  .panel {
    background: #131722;
    border: 1px solid #1e222d;
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid #1e222d;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header h2 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #787b86;
  }

  .panel-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #26a69a;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .panel-body {
    padding: 0;
    min-height: 300px;
  }

  .full-width {
    grid-column: 1 / -1;
  }

  .ticker-tape {
    grid-column: 1 / -1;
  }

  .tradingview-widget-container { width: 100% !important; }

  /* Pull-to-refresh indicator */
  .refresh-hint {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: #787b86;
    display: none;
  }

  @media (max-width: 900px) {
    .dashboard {
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 8px;
    }

    header h1 { font-size: 16px; }
    #clock { font-size: 11px; }

    .panel-body { min-height: 280px; }
  }

  @media (max-width: 400px) {
    header { padding: 10px 12px; }
    .panel-header { padding: 8px 12px; }
    .panel-header h2 { font-size: 11px; }
  }
</style>
</head>
<body>

<script>
  function updateClock() {
    const now = new Date();
    const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
    const local = now.toLocaleString('en-US', options);
    const nyTime = now.toLocaleString('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', hour12: true });
    document.getElementById('clock').textContent = `${local} · NY: ${nyTime}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
